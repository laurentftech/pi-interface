name: Release

# Publishes on a version tag: `git tag v0.1.0 && git push origin v0.1.0`.
# The tag is the trigger *and* the version claim — the job refuses to publish if it
# disagrees with what the packages say about themselves.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  # The OIDC token GitHub mints for this workflow. npm's trusted publisher for both
  # packages names this repo and this file, so the token *is* the credential: no
  # NPM_TOKEN, nothing to steal from the repo's secrets, and provenance is attested
  # from it automatically.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.
      # Without this npm never even attempts OIDC, and asks for a token instead.
      - run: npm install -g npm@latest

      - run: npm ci

      # A tag claims a version; at least one package must actually be at it, and none
      # may disagree with it. (The two packages version independently — a cli-only
      # release leaves embed behind, and must not force a no-op republish of it.)
      - name: Tag must match the packages it releases
        id: plan
        run: |
          tag="${GITHUB_REF_NAME#v}"
          publish=""
          for pkg in cli embed; do
            version=$(node -p "require('./$pkg/package.json').version")
            if [ "$version" = "$tag" ]; then
              name=$(node -p "require('./$pkg/package.json').name")
              # Idempotent: a re-run after a half-published tag skips what already landed
              if npm view "$name@$tag" version > /dev/null 2>&1; then
                echo "$name@$tag is already on npm — skipping"
              else
                publish="$publish $pkg"
              fi
            fi
          done
          if [ -z "$publish" ]; then
            echo "::error::no package is at version $tag (or all are already published)"
            exit 1
          fi
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

      # The same gates as CI — a tag must not be a way around them.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test --workspace server
      - run: npm run build

      # prepack rebuilds each package from this clean checkout, so what ships is what
      # was just tested — never a stale dist/ from someone's machine.
      #
      # No credential here on purpose: npm authenticates with the OIDC token above,
      # against the trusted publisher registered for each package. `--provenance` is
      # not passed either — trusted publishing attests it on its own.
      - name: Publish
        run: |
          for pkg in ${{ steps.plan.outputs.publish }}; do
            npm publish --workspace "$pkg"
          done
